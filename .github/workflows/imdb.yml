name: IMDb import

on:
  schedule:
    # Run daily at 03:00 Netherlands time.
    # DST-aware approximation using two cron entries:
    # - During CEST (Apr-Oct) 03:00 CEST = 01:00 UTC
    - cron: '0 1 * 4-10 *'
    # - During CET (Nov-Mar) 03:00 CET = 02:00 UTC
    - cron: '0 2 * 11,12,1,2,3 *'
  workflow_dispatch: {}

jobs:
  import:
    name: Run IMDb import
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        ports: ['5432:5432']
        env:
          POSTGRES_DB: filmflix
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d filmflix"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: filmflix
      DB_USER: postgres
      DB_PASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run import script against local Postgres service
        run: |
          python scripts/import_imdb.py
